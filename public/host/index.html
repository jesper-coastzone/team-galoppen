<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Team Galoppen — Host</title>
<meta name="theme-color" content="#1F3E63">
<link rel="icon" href="/icon.png?size=64">
<link rel="apple-touch-icon" href="/icon.png?size=180">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared/tokens.css">
<link rel="stylesheet" href="/shared/components.css">
<style>
  body { background: var(--cream-2); }
  .hostbar { background: var(--navy); color: var(--on-navy); padding: 10px 18px; display: flex; align-items: center; gap: 18px; position: sticky; top: 0; z-index: 20; }
  .hostbar .code { font-family: var(--font-num); font-weight: 800; font-size: 22px; letter-spacing: 3px; color: var(--gold-soft); }
  .hostbar .urls { margin-left: auto; font-size: 12px; opacity: .85; text-align: right; line-height: 1.5; }
  .wrap { max-width: 1500px; margin: 0 auto; padding: 16px; display: grid; grid-template-columns: 1.3fr 1fr; gap: 16px; align-items: start; }
  @media (max-width: 1100px){ .wrap{ grid-template-columns:1fr; } }
  .slidebar { display: flex; align-items: center; gap: 10px; }
  .slidebar .now { flex: 1; }
  .slidebar .now .t { font-family: var(--font-display); font-weight: 800; font-size: 22px; color: var(--navy); }
  .deck-list { max-height: 220px; overflow: auto; border: 1px solid var(--line); border-radius: 10px; }
  .deck-list .d { padding: 7px 10px; font-size: 13px; cursor: pointer; border-bottom: 1px solid var(--line); display: flex; gap: 8px; }
  .deck-list .d:hover { background: var(--cream); }
  .deck-list .d.active { background: #eef3d9; font-weight: 700; }
  .teamline { display: grid; grid-template-columns: 32px 1fr auto auto; gap: 8px; align-items: center; padding: 7px 0; border-bottom: 1px dashed var(--line); font-size: 14px; }
  .sec { margin-bottom: 16px; }
  .sec h3 { margin-bottom: 8px; }
  .approve { border: 2px solid var(--gold); border-radius: 12px; padding: 10px; margin-bottom: 8px; }
  .log { font-size: 12px; max-height: 260px; overflow: auto; }
  .log div { padding: 3px 0; border-bottom: 1px solid var(--line); color: var(--text-dim); }
  .mini { font-size: 12px; color: var(--text-faint); }
  details summary { cursor: pointer; font-weight: 700; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/shared/client.js"></script>
  <script src="/host/host.js"></script>
</body>
</html>
